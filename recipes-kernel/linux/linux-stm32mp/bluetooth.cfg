# =========================================================================
# Bluetooth kernel config fragment for TP-Link UB500 (Realtek RTL8761BUV)
# =========================================================================
# Drop this fragment into SRC_URI via linux-stm32mp_%.bbappend.
# kernel-yocto merges it at do_kernel_configme time; conflicting options
# already set to a higher value in the base defconfig are flagged by
# do_kernel_configcheck (they are warnings, not errors).
# =========================================================================

# ── Core Bluetooth subsystem ──────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_BREDR=y
CONFIG_BT_LE=y
CONFIG_BT_RFCOMM=y
CONFIG_BT_HIDP=y
CONFIG_BT_DEBUGFS=y

# ── HCI USB transport (btusb) ─────────────────────────────────────────────
# CONFIG_BT_HCIBTUSB=y   builds btusb into the kernel (no modprobe needed)
# CONFIG_BT_HCIBTUSB_RTL adds the Realtek firmware-download state machine
# CONFIG_BT_HCIBTUSB_BCM is harmless to enable alongside RTL
CONFIG_BT_HCIBTUSB=y
CONFIG_BT_HCIBTUSB_RTL=y
CONFIG_BT_HCIBTUSB_BCM=y

# ── Cryptographic primitives required by the BT Security Manager ──────────
# (BLE pairing and link-layer encryption will fail without these)
CONFIG_CRYPTO_CMAC=y
CONFIG_CRYPTO_AES=y
CONFIG_CRYPTO_ECB=y
CONFIG_CRYPTO_SHA256=y

# ── Firmware loader ───────────────────────────────────────────────────────
# btusb requests rtl_bt/rtl8761bu_fw.bin via request_firmware() at probe time.
# FW_LOADER must be enabled; the file comes from the linux-firmware package.
CONFIG_FW_LOADER=y
