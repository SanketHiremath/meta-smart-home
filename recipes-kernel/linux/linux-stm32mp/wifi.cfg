# =========================================================================
# WiFi kernel config fragment — Realtek RTL8188EUS (USB ID 0x8179)
# Driver: rtl8xxxu (CONFIG_RTL8188EU absent from ST 6.6 kernel tree)
# =========================================================================

# Wireless subsystem
CONFIG_WLAN=y
CONFIG_CFG80211=y
CONFIG_MAC80211=y
CONFIG_RFKILL=y

# rtl8xxxu driver — supports RTL8188EUS (USB ID 0x8179).
# CONFIG_RTL8188EU does not exist in the ST 6.6 kernel tree.
# rtl8xxxu is present (confirmed via /proc/config.gz) and covers this chip.
CONFIG_RTL8XXXU=m
